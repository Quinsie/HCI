<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>전자출결 — 인터랙티브 프로토타입</title>
<style>
  :root{
    --blue:#1e6fd9; --green:#2e7d32; --yellow:#d6a200; --red:#c0392b; --gray:#8a8a8a;
    --ink:#111; --line:#111; --paper:#fff; --soft:#f4f4f2; --mut:#777;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#3a3a3c;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:var(--ink);}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #scaler{transform-origin:center center;}
  .device{width:390px;height:844px;background:var(--paper);border-radius:44px;border:10px solid #111;position:relative;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5);}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#111;border-bottom-left-radius:16px;border-bottom-right-radius:16px;z-index:30;}
  .statusbar{height:44px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 4px;font-size:13px;font-weight:600;color:#111;}
  .app{position:absolute;top:44px;left:0;right:0;bottom:0;display:flex;flex-direction:column;}

  /* screen scaffold */
  .screen{flex:1;display:flex;flex-direction:column;min-height:0;padding:8px 18px 16px;overflow:hidden;}
  .scroll{flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .scroll::-webkit-scrollbar{display:none;}
  .topbar{display:flex;align-items:center;gap:10px;height:38px;flex:0 0 auto;}
  .topbar .back{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
  .topbar .back:active{background:var(--soft);}
  .topbar .t{font-size:17px;font-weight:700;}
  .topbar .r{margin-left:auto;font-size:13px;color:var(--mut);}

  .muted{color:var(--mut);} .small{font-size:12px;} .xs{font-size:11px;}
  .center{text-align:center;} .b{font-weight:700;} .grow{flex:1;}
  .row{display:flex;align-items:center;gap:8px;} .between{justify-content:space-between;}
  hr{border:none;border-top:1px solid #e6e6e3;margin:8px 0;}

  .card{border:1px solid #e2e2de;border-radius:14px;padding:12px 14px;background:#fff;margin-bottom:10px;}
  .card.em{border:2px solid #111;border-radius:16px;}
  .card.dash{border-style:dashed;border-color:#bbb;}
  .card.warn{background:#fff8df;border-color:#e7d089;}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--mut);margin-bottom:4px;}
  .big{font-size:19px;font-weight:800;letter-spacing:-.01em;}

  .btn{display:flex;align-items:center;justify-content:center;gap:6px;border:1px solid #111;border-radius:12px;padding:14px;font-size:15px;font-weight:700;background:#fff;cursor:pointer;user-select:none;}
  .btn:active{transform:translateY(1px);}
  .btn.pri{background:#111;color:#fff;}
  .btn.blue{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn.ghost{background:#fff;}
  .btn.danger{background:var(--red);color:#fff;border-color:var(--red);}
  .btn[disabled]{opacity:.4;pointer-events:none;}

  .field{border:1px solid #d8d8d4;border-radius:12px;padding:10px 12px;margin-bottom:10px;background:#fff;}
  .field .v{font-size:15px;color:#111;} .field .v.ph{color:#aaa;}

  .chip{border:1px solid #cfcfca;border-radius:999px;padding:5px 12px;font-size:13px;background:#fff;cursor:pointer;user-select:none;}
  .chip.on{background:#111;color:#fff;border-color:#111;}
  .seg{display:inline-flex;border:1px solid #cfcfca;border-radius:999px;overflow:hidden;}
  .seg div{padding:5px 12px;font-size:13px;cursor:pointer;user-select:none;}
  .seg div.on{background:#111;color:#fff;}

  /* central circle — FIXED zone */
  .attTop{flex:0 0 196px;display:flex;flex-direction:column;gap:8px;padding-top:4px;}
  .circleZone{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;}
  .attBottom{flex:0 0 124px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:7px;padding-top:6px;overflow:hidden;}
  .circle{width:200px;height:200px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;border:2px solid #111;transition:background .25s,color .25s,border-color .25s;}
  .circle .ct{font-size:24px;font-weight:800;line-height:1.15;}
  .circle .cs{font-size:12px;font-weight:600;margin-top:6px;opacity:.92;}
  .circle.idle{background:var(--blue);border-color:var(--blue);}
  .circle.green{background:var(--green);border-color:var(--green);}
  .circle.yellow{background:var(--yellow);border-color:var(--yellow);color:#1a1400;}
  .circle.red{background:var(--red);border-color:var(--red);}
  .circle.block{background:#9a9a9a;border-color:#7a7a7a;}
  .circle.load{background:#fff;color:#111;border:9px solid #e6e6e6;position:relative;}
  .circle.load::before{content:'';position:absolute;inset:-9px;border-radius:50%;border:9px solid transparent;border-top-color:var(--blue);animation:spin 1s linear infinite;}
  .circle.load .ct,.circle.load .cs{position:relative;z-index:1;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .circle.tap{cursor:pointer;} .circle.tap:active{transform:scale(.97);}

  /* nav */
  .nav{flex:0 0 auto;display:flex;border-top:1px solid #e6e6e3;padding-top:6px;margin-top:4px;}
  .nav div{flex:1;text-align:center;font-size:11px;color:#aaa;cursor:pointer;padding:4px 0;}
  .nav div.on{color:#111;font-weight:800;}

  /* checklist */
  .chk{display:flex;gap:18px;}
  .chk b{font-weight:600;font-size:13px;}
  .ok{color:var(--green);} .no{color:var(--red);}

  /* pills / status */
  .pill{display:inline-block;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700;color:#fff;}
  .pill.att{background:var(--green);} .pill.late{background:var(--yellow);color:#1a1400;}
  .pill.abs{background:var(--red);} .pill.none{background:var(--gray);} .pill.err{background:var(--red);}
  .pill.warn{background:var(--yellow);color:#1a1400;}

  /* sum row (dashboard) */
  .sum{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;}
  .sum .c{border:1px solid #e2e2de;border-radius:10px;text-align:center;padding:7px 2px;font-size:11px;color:var(--mut);}
  .sum .c b{display:block;font-size:17px;color:#111;margin-top:2px;}
  .sum .c.att{background:rgba(46,125,50,.10);} .sum .c.late{background:rgba(214,162,0,.16);}
  .sum .c.none{background:rgba(138,138,138,.14);} .sum .c.err{background:rgba(192,57,43,.12);}

  .stu{display:flex;align-items:center;justify-content:space-between;border:1px solid #ececec;border-radius:10px;padding:8px 11px;margin-bottom:6px;cursor:pointer;}
  .stu:active{background:var(--soft);}
  .stu .id{display:block;font-size:11px;color:var(--mut);}

  .wk{display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e2de;border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;}
  .wk:active{background:var(--soft);}

  /* keypad */
  .pin{display:flex;gap:10px;justify-content:center;margin:6px 0 14px;}
  .pin .d{width:46px;height:56px;border:1px solid #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#111;}
  .pin .d.e{color:#ccc;}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .keypad .k{border:1px solid #ddd;border-radius:12px;padding:14px 0;text-align:center;font-size:20px;font-weight:600;cursor:pointer;user-select:none;background:#fff;}
  .keypad .k:active{background:var(--soft);}
  .keypad .k.act{background:var(--blue);color:#fff;border-color:var(--blue);}

  .toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);background:#111;color:#fff;padding:9px 16px;border-radius:999px;font-size:13px;z-index:40;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:.95;}

  .fade{animation:fade .28s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;color:var(--mut);}
  #resetBtn{position:fixed;left:14px;bottom:14px;z-index:50;background:#fff;color:#111;border:none;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.35);cursor:pointer;opacity:.9;font-family:inherit;}
  #resetBtn:active{transform:translateY(1px);}
</style>
</head>
<body>
  <div id="stage"><div id="scaler"><div class="device" id="device"></div></div></div>
  <button id="resetBtn">↺ 처음부터</button>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // fit device into viewport
    function fit(){
      var dev=document.querySelector('.device'), sc=document.getElementById('scaler');
      var s=Math.min(window.innerWidth/410, window.innerHeight/864, 1.15);
      sc.style.transform='scale('+s+')';
    }
    window.addEventListener('resize',fit); fit();
    document.getElementById('resetBtn').addEventListener('click',function(){
      try{localStorage.removeItem('eatt_proto_v1');}catch(e){}
      location.reload();
    });
  </script>

  <script type="text/babel" src="core.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="student.jsx"></script>
  <script type="text/babel" src="prof.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
